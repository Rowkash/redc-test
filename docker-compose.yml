services:

  backend:
    container_name: 'redc-api'
    build:
      context: .
      target: runner
    restart: always
    env_file:
      - .env
    networks:
      - redc-network

  postgres:
    container_name: 'redc-postgres'
    image: postgres:18
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/18/docker
    ports:
      - '5432:5432'
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - redc-network

  redis:
    container_name: 'redc-redis'
    image: redis:latest
    env_file:
      - .env
    volumes:
      - redis-data:/data/redis
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - redc-network


  nginx:
    container_name: "redc-nginx"
    image: nginx
    ports:
      - "8080:8080"
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      backend:
        condition: service_started
    networks:
      - redc-network

networks:
  redc-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
